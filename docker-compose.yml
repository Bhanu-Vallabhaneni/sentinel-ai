version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  dashboard:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "pip install -r requirements.txt && streamlit run dashboard/dashboard_app.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "8501:8501"
    depends_on:
      - api
