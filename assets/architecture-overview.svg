<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">SentinelAI Architecture</title>
  <desc id="desc">Architecture diagram showing ingestion, detection, correlation, enrichment, and presentation layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" />
    </marker>
    <style>
      .title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .subtitle { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .box { fill: #111827; stroke: #38bdf8; stroke-width: 2; rx: 18; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .copy { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .line { stroke: #38bdf8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)" rx="24" />
  <text x="44" y="48" class="title">SentinelAI Architecture</text>
  <text x="44" y="74" class="subtitle">Authentication events move through normalization, detection, correlation, and analyst-facing outputs.</text>

  <rect x="40" y="130" width="190" height="130" class="box" />
  <text x="62" y="168" class="label">1. Ingestion</text>
  <text x="62" y="195" class="copy">Load JSON security events</text>
  <text x="62" y="214" class="copy">Normalize into SecurityEvent</text>
  <text x="62" y="233" class="copy">Preserve user, IP, time, status</text>

  <rect x="270" y="130" width="190" height="130" class="box" />
  <text x="292" y="168" class="label">2. Detection</text>
  <text x="292" y="195" class="copy">Rule-based security logic</text>
  <text x="292" y="214" class="copy">IsolationForest anomaly signal</text>
  <text x="292" y="233" class="copy">Risk score + severity</text>

  <rect x="500" y="130" width="190" height="130" class="box" />
  <text x="522" y="168" class="label">3. Correlation</text>
  <text x="522" y="195" class="copy">Group risky detections</text>
  <text x="522" y="214" class="copy">Aggregate by username</text>
  <text x="522" y="233" class="copy">Create incident evidence sets</text>

  <rect x="730" y="130" width="190" height="130" class="box" />
  <text x="752" y="168" class="label">4. Enrichment</text>
  <text x="752" y="195" class="copy">ATT&amp;CK mapping</text>
  <text x="752" y="214" class="copy">Structured summary generation</text>
  <text x="752" y="233" class="copy">Recommended analyst actions</text>

  <rect x="960" y="110" width="200" height="170" class="box" />
  <text x="982" y="148" class="label">5. Outputs</text>
  <text x="982" y="175" class="copy">FastAPI endpoints</text>
  <text x="982" y="194" class="copy">Streamlit dashboard</text>
  <text x="982" y="213" class="copy">Incident report payload</text>
  <text x="982" y="232" class="copy">Demo-friendly evidence timeline</text>

  <path d="M230 195 L270 195" class="line" />
  <path d="M460 195 L500 195" class="line" />
  <path d="M690 195 L730 195" class="line" />
  <path d="M920 195 L960 195" class="line" />
</svg>
