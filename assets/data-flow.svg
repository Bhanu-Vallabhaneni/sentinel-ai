<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">SentinelAI Data Flow</title>
  <desc id="desc">Data flow diagram showing how events become detections, incidents, and API or dashboard output.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#082f49" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" />
    </marker>
    <style>
      .title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .node { fill: #111827; stroke: #f59e0b; stroke-width: 2; rx: 18; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #fef3c7; }
      .copy { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #e5e7eb; }
      .line { stroke: #f59e0b; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg2)" rx="24" />
  <text x="44" y="50" class="title">SentinelAI Data Flow</text>
  <text x="44" y="76" class="subtitle">Each event is transformed from raw telemetry into a scored detection, then into a correlated incident.</text>

  <rect x="70" y="130" width="250" height="90" class="node" />
  <text x="92" y="166" class="label">Raw Event Input</text>
  <text x="92" y="192" class="copy">JSON auth logs with user, IP, country,</text>
  <text x="92" y="210" class="copy">timestamp, action, status, privileged</text>

  <rect x="390" y="130" width="250" height="90" class="node" />
  <text x="412" y="166" class="label">Feature + Rule Evaluation</text>
  <text x="412" y="192" class="copy">Failure counts, country changes,</text>
  <text x="412" y="210" class="copy">after-hours access, privileged logins</text>

  <rect x="710" y="130" width="250" height="90" class="node" />
  <text x="732" y="166" class="label">Detection Record</text>
  <text x="732" y="192" class="copy">Rules triggered, anomaly score,</text>
  <text x="732" y="210" class="copy">risk score, severity, reasons</text>

  <rect x="390" y="300" width="250" height="90" class="node" />
  <text x="412" y="336" class="label">Incident Correlation</text>
  <text x="412" y="362" class="copy">Escalate detections above threshold</text>
  <text x="412" y="380" class="copy">and group them by username</text>

  <rect x="710" y="300" width="250" height="90" class="node" />
  <text x="732" y="336" class="label">Enriched Incident</text>
  <text x="732" y="362" class="copy">ATT&amp;CK techniques, summary,</text>
  <text x="732" y="380" class="copy">recommended actions, confidence</text>

  <rect x="980" y="215" width="150" height="120" class="node" />
  <text x="1002" y="251" class="label">Outputs</text>
  <text x="1002" y="277" class="copy">API</text>
  <text x="1002" y="295" class="copy">Dashboard</text>
  <text x="1002" y="313" class="copy">Report</text>

  <path d="M320 175 L390 175" class="line" />
  <path d="M640 175 L710 175" class="line" />
  <path d="M835 220 L835 300" class="line" />
  <path d="M640 345 L710 345" class="line" />
  <path d="M960 345 L980 295" class="line" />
</svg>
